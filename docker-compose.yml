services:
 

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    environment:
      - CLUSTER_ID=q1Sh-9_ISia_zwGINzRvyQ
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9092:9092"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  dashboard:
    build: .
    depends_on:
      - socketio
      - binance-stream
    volumes:
      - .:/app
    command: python -m http.server 3000 --directory /app/dashboard
    ports:
      - "3000:3000"

  socketio:
    build: .
    depends_on:
      - redis
    volumes:
      - .:/app
    environment:
      - SOCKETIO_REDIS_URL=redis://redis:6379/2
    command: uvicorn app.socketio_app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  binance-stream:
    build: .
    depends_on:
      - redis
      - socketio
    volumes:
      - .:/app
    environment:
      - SOCKETIO_REDIS_URL=redis://redis:6379/2
      - BINANCE_SYMBOL=btcusdt
      - VOLUME_WINDOW_SECONDS=60
      - RECENT_TRADES_LIMIT=20
    command: python -m app.binance_stream

  orchestration-monitor:
    build: .
    depends_on:
      - redis
      - kafka
      - socketio
      - binance-stream
      - celery-worker-1
      - celery-worker-2
      - celery-worker-3
    volumes:
      - .:/app
    environment:
      - SOCKETIO_REDIS_URL=redis://redis:6379/2
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: python -m app.orchestration_monitor

  celery-worker-1:
    build: .
    depends_on:
      - redis
      - kafka
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SOCKETIO_REDIS_URL=redis://redis:6379/2
      - WORKER_LABEL=celery-worker-1
    command: celery -A app.celery_app.celery worker -l info -n worker1@%h

  celery-worker-2:
    build: .
    depends_on:
      - redis
      - kafka
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SOCKETIO_REDIS_URL=redis://redis:6379/2
      - WORKER_LABEL=celery-worker-2
    command: celery -A app.celery_app.celery worker -l info -n worker2@%h

  celery-worker-3:
    build: .
    depends_on:
      - redis
      - kafka
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SOCKETIO_REDIS_URL=redis://redis:6379/2
      - WORKER_LABEL=celery-worker-3
    command: celery -A app.celery_app.celery worker -l info -n worker3@%h
